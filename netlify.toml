## Codex Studio — Netlify config (v0.9.1)
## Phase 1: only caching headers. Build-step не нужен (статика).

[build]
  publish = "."

# Итерация D — serverless-функции (GitHub OAuth proxy админки: cms-auth.mjs)
[functions]
  directory = "netlify/functions"

# Исходники функций не должны раздаваться как статика (publish = ".")
[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404

# Long-cache на статические ассеты (immutable — пути не меняются без обновления имени)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

# v0.9.1 — CSS/JS получают тот же long-cache что и /assets/. Без cache-bust
# в именах файлов используем stale-while-revalidate: 1 день hot cache,
# 30 дней stale-OK с background revalidation. ETag поверх обеспечивает
# invalidation при реальных изменениях (Netlify ставит ETag по содержимому
# автоматически). PageSpeed жаловался на «7 дней» default — этот pattern
# даёт лучший repeat-visit без stale-version риска.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "max-age=86400, stale-while-revalidate=2592000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "max-age=86400, stale-while-revalidate=2592000"

# HTML — всегда revalidate (must-revalidate чтобы менялся быстро).
# prod-review F2 (E-20): сплат у Netlify валиден только в КОНЦЕ пути,
# паттерн "/*.html" не матчился — страницы перечислены явно. NB: прод
# хостится на Beget (см. .htaccess), этот файл — для Netlify-превью.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

[[headers]]
  for = "/free-assets.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

# Корневой / — тоже html, должен revalidate
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

# prod-review F2: зеркало admin/.htaccess для Netlify-контура — если админка
# когда-либо живёт на Netlify (OAuth-вход работает только там), она получает
# те же no-store/noindex/CSP, что и на Beget (кросс-ревью F2).
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"
    Content-Security-Policy = "default-src 'self'; script-src 'self' blob: 'sha256-MAZbmChJyw59Z0ELyPBNxPfJrWmKlzxELbVGM4lgy2U=' 'unsafe-hashes' 'sha256-1jAmyYXcRq6zFldLe/GCgIDJBiOONdXjTLgEFMDnDSM=' 'wasm-unsafe-eval'; style-src 'self' https://api.fontshare.com 'unsafe-inline'; font-src 'self' https://cdn.fontshare.com; img-src 'self' data: blob: https://avatars.githubusercontent.com; media-src 'self' blob:; connect-src 'self' blob: https://api.github.com https://www.cloudflare.com; frame-src 'self' https://player.vimeo.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; manifest-src 'self'"
